                                            onClick={() => document.getElementById('finalFileSelect').click()}
                                            className={`w-full border-2 border-dashed rounded-[2rem] p-12 transition-all cursor-pointer flex flex-col items-center justify-center text-center ${tempFile ? 'border-emerald-500 bg-emerald-50' : 'border-gray-200 hover:border-black hover:bg-gray-50'}`}
                                        >
                                            <span className="text-4xl mb-4">{tempFile ? '✅' : '📁'}</span>
                                            <p className="text-sm font-bold tracking-tight">{tempFile ? tempFile.name : 'Click to select video file'}</p>
                                            <p className="text-[9px] text-gray-400 mt-2 tracking-widest">Supports .mp4, .mov, .avi</p>
                                            <input type="file" id="finalFileSelect" className="hidden" accept="video/*" onChange={(e) => setTempFile(e.target.files[0])} />
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-4">
                                            <label className="text-[10px] tracking-widest text-gray-400 font-bold uppercase">Date</label>
                                            <input 
                                                type="date" 
                                                required 
                                                value={newCreatorVideoData.date} 
                                                onChange={(e) => setNewCreatorVideoData({...newCreatorVideoData, date: e.target.value})} 
                                                className="w-full bg-gray-50 border border-transparent rounded-2xl px-6 py-4 focus:border-black outline-none transition-all text-sm font-bold" 
                                            />
                                        </div>
                                        <div className="space-y-4">
                                            <label className="text-[10px] tracking-widest text-gray-400 font-bold uppercase">Status</label>
                                            <select 
                                                required 
                                                value={newCreatorVideoData.status} 
                                                onChange={(e) => setNewCreatorVideoData({...newCreatorVideoData, status: e.target.value})} 
                                                className="w-full bg-gray-50 border border-transparent rounded-2xl px-6 py-4 focus:border-black outline-none transition-all text-sm font-bold"
                                            >
                                                <option value="Approved">Approved</option>
                                                <option value="Published">Posted</option>
                                                <option value="Review">Review</option>
                                                <option value="Shooting">Shooting</option>
                                            </select>
                                        </div>
                                    </div>

                                    <button 
                                        type="submit" 
                                        className={`w-full py-6 rounded-3xl text-[10px] tracking-widest font-black transition-all shadow-xl ${(tempFile || uploadingVideoId) ? 'bg-black text-white hover:scale-[1.02] shadow-black/20' : 'bg-gray-100 text-gray-300 cursor-not-allowed'}`}
                                    >
                                        FINISH & UPLOAD
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OSACMarketingHub />);
    </script>
</body>

</html>
