<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSAC MARKETING TEAM | Operational Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Poppins', sans-serif !important;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            margin: 0;
            background: #ffffff;
            color: #000000;
            overflow-x: hidden;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #ffffff;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #f3f4f6;
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #000000;
        }

        .animate-in {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Initialize Supabase
        const SUPABASE_URL = "https://fpodqofffxdvphkvznqg.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwb2Rxb2ZmZnhkdnBoa3Z6bnFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNDc4MjUsImV4cCI6MjA4ODYyMzgyNX0.kZUnaY6_dltNS5QrVDGXl3wCBbfq33zni_x1fbbWgIk";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const STATUSES = ["Not Started", "Scripting", "Shooting", "Editing", "Review", "Approved", "Scheduled", "Published"];
        const CREATORS = ["PRUTHUVI ELLPOLA", "MOHAMMED RISWAN", "ARASH AKBARI"];

        // Setup IndexedDB for video storage locally
        const dbPromise = new Promise((resolve, reject) => {
            const request = indexedDB.open("OSAC_VideoDB", 1);
            request.onerror = (e) => reject("Database error: " + e.target.errorCode);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if(!db.objectStoreNames.contains('videos')) {
                    db.createObjectStore('videos', { keyPath: 'id' });
                }
            };
            request.onsuccess = (e) => resolve(e.target.result);
        });

        async function saveLocalVideo(id, videoName, videoUrl) {
            const db = await dbPromise;
            return new Promise((resolve) => {
                const tx = db.transaction("videos", "readwrite");
                tx.objectStore("videos").put({ id, videoName, videoUrl });
                tx.oncomplete = () => resolve();
            });
        }

        async function getLocalVideos() {
            const db = await dbPromise;
            return new Promise((resolve) => {
                const tx = db.transaction("videos", "readonly");
                const req = tx.objectStore("videos").getAll();
                req.onsuccess = () => resolve(req.result || []);
            });
        }

        function OSACMarketingHub() {
            const [contentItems, setContentItems] = useState([]);
            const [managedScripts, setManagedScripts] = useState({
                "Property Projects": [],
                "Real Estate Trends": [],
                "Why Choose OSAC": [],
                "Authority Branding": [],
                "Social Proof": [],
                "Deal Celebration": []
            });
            const [photoshoots, setPhotoshoots] = useState([]);
            const [loading, setLoading] = useState(true);

            // Fetch initial data from Supabase
            useEffect(() => {
                fetchData();
            }, []);

            async function fetchData() {
                setLoading(true);
                try {
                    // Optimized: Fetch only metadata, exclude large Base64 blobs (video_url, script_url)
                    const [videosRes, scriptsRes, photoshootsRes] = await Promise.all([
                        supabaseClient.from('videos').select('id, title, creator, agent_name, status, deadline_date, posted_date, script, location').order('created_at', { ascending: false }),
                        supabaseClient.from('scripts').select('id, pillar, name, date'),
                        supabaseClient.from('photoshoots').select('*').order('created_at', { ascending: false })
                    ]);

                    if (videosRes.error) throw videosRes.error;
                    if (scriptsRes.error) throw scriptsRes.error;
                    if (photoshootsRes.error) throw photoshootsRes.error;

                    // Fetch local videos to merge
                    const localVideos = await getLocalVideos();
                    const localVideosMap = {};
                    localVideos.forEach(lv => {
                        localVideosMap[lv.id] = lv;
                    });

                    // Supabase columns use snake_case, so we map them to the component's camelCase
                    const mappedVideos = (videosRes.data || []).map(v => ({
                        id: v.id,
                        title: v.title,
                        creator: v.creator,
                        agentName: v.agent_name,
                        status: v.status,
                        deadlineDate: v.deadline_date,
                        postedDate: v.posted_date,
                        script: v.script,
                        scriptUrl: v.script_url,
                        location: v.location,
                        videoUrl: localVideosMap[v.id]?.videoUrl || '',
                        videoName: localVideosMap[v.id]?.videoName || ''
                    }));
                    setContentItems(mappedVideos);

                    const scriptsMap = {
                        "Property Projects": [],
                        "Real Estate Trends": [],
                        "Why Choose OSAC": [],
                        "Authority Branding": [],
                        "Social Proof": [],
                        "Deal Celebration": []
                    };

                    (scriptsRes.data || []).forEach(s => {
                        if (scriptsMap[s.pillar]) {
                            scriptsMap[s.pillar].push({
                                id: s.id,
                                name: s.name,
                                url: s.url,
                                date: s.date
                            });
                        }
                    });
                    setManagedScripts(scriptsMap);
                    setPhotoshoots(photoshootsRes.data || []);

                } catch (error) {
                    console.error("Error fetching data:", error);
                } finally {
                    setLoading(false);
                }
            }

            // Pre-index items by date for faster calendar rendering
            const itemsByDate = useMemo(() => {
                const map = {};
                contentItems.forEach(item => {
                    const date = item.deadlineDate;
                    if (!map[date]) map[date] = { events: [], photoshoots: [] };
                    map[date].events.push(item);
                });
                photoshoots.forEach(ps => {
                    const date = ps.date;
                    if (!map[date]) map[date] = { events: [], photoshoots: [] };
                    map[date].photoshoots.push(ps);
                });
                return map;
            }, [contentItems, photoshoots]);

            const [currentView, setCurrentView] = useState('calendar');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [editingItem, setEditingItem] = useState(null);
            const [viewDate, setViewDate] = useState(new Date());
            const [previewUrl, setPreviewUrl] = useState(null);
            const [previewName, setPreviewName] = useState("");

            const [formData, setFormData] = useState({ title: '', creator: '', agentName: '', status: 'Not Started', deadlineDate: '', postedDate: '', script: '', scriptUrl: '', location: '', videoUrl: '', videoName: '' });

            const [uploadingVideoId, setUploadingVideoId] = useState(null);
            const [isUploadModalOpen, setIsUploadModalOpen] = useState(false);
            const [tempFile, setTempFile] = useState(null);
            
            // New Video Data for Creator Hub form
            const [newCreatorVideoData, setNewCreatorVideoData] = useState({
                creator: '',
                date: new Date().toISOString().split('T')[0],
                status: 'Approved' // Choices: Approved or Published (Posted)
            });

            const [isPhotoshootModalOpen, setIsPhotoshootModalOpen] = useState(false);
            const [editingPhotoshoot, setEditingPhotoshoot] = useState(null);
            const [photoshootFormData, setPhotoshootFormData] = useState({ name: '', team: 'Team Tiger', date: '' });
            const TEAMS = ["Team Tiger", "Team Ethiopian", "Team International", "Team Eagle"];

            const handleOpenPhotoshootModal = (item = null, date = null) => {
                if (item) {
                    setEditingPhotoshoot(item);
                    setPhotoshootFormData(item);
                } else {
                    setEditingPhotoshoot(null);
                    setPhotoshootFormData({
                        name: '',
                        team: 'Team Tiger',
                        date: date || new Date().toISOString().split('T')[0]
                    });
                }
                setIsPhotoshootModalOpen(true);
            };

            const handleSavePhotoshoot = async (e) => {
                e.preventDefault();
                try {
                    const data = {
                        name: photoshootFormData.name,
                        team: photoshootFormData.team,
                        date: photoshootFormData.date
                    };
                    if (editingPhotoshoot) {
                        const { error } = await supabaseClient.from('photoshoots').update(data).eq('id', editingPhotoshoot.id);
                        if (error) throw error;
                    } else {
                        const { error } = await supabaseClient.from('photoshoots').insert([data]);
                        if (error) throw error;
                    }
                    await fetchData();
                    setIsPhotoshootModalOpen(false);
                } catch (error) {
                    alert("Error saving photoshoot: " + error.message);
                }
            };

            const handleDeletePhotoshoot = async () => {
                if (editingPhotoshoot) {
                    try {
                        const { error } = await supabaseClient.from('photoshoots').delete().eq('id', editingPhotoshoot.id);
                        if (error) throw error;
                        await fetchData();
                        setIsPhotoshootModalOpen(false);
                    } catch (error) {
                        alert("Error deleting photoshoot: " + error.message);
                    }
                }
            };

            const handleOpenModal = (item = null, date = null) => {
                if (item) {
                    setEditingItem(item);
                    // Ensure we don't clear urls if they exist in the object already
                    setFormData({
                        ...item,
                        scriptUrl: item.scriptUrl || '',
                        videoUrl: item.videoUrl || ''
                    });
                } else {
                    setEditingItem(null);
                    setFormData({
                        title: '',
                        creator: '',
                        agentName: '',
                        status: 'Not Started',
                        deadlineDate: date || new Date().toISOString().split('T')[0],
                        postedDate: '',
                        script: '',
                        scriptUrl: '',
                        location: '',
                        videoUrl: '',
                        videoName: ''
                    });
                }
                setIsModalOpen(true);
            };

            const [fetchingBlob, setFetchingBlob] = useState(false);

            const handleRequestPreview = async (type, id, name) => {
                setFetchingBlob(true);
                try {
                    const isLocalVideo = type === 'video';
                    
                    if (isLocalVideo) {
                        const localVideos = await getLocalVideos();
                        const lv = localVideos.find(v => v.id === id);
                        if (lv) {
                            setPreviewUrl(lv.videoUrl);
                            setPreviewName(lv.videoName || name);
                        } else {
                            throw new Error("Local video not found");
                        }
                    } else {
                        const table = 'scripts';
                        const column = 'url';
                        
                        const { data, error } = await supabaseClient
                            .from(table)
                            .select(column)
                            .eq('id', id)
                            .single();
                        
                        if (error) throw error;
                        setPreviewUrl(data[column]);
                        setPreviewName(name);
                    }
                    
                    if (error) throw error;
                    
                    setPreviewUrl(data[column]);
                    setPreviewName(name);
                } catch (error) {
                    alert("Error loading file: " + error.message);
                } finally {
                    setFetchingBlob(false);
                }
            };

            const handleSave = async (e) => {
                e.preventDefault();
                const videoData = {
                    title: formData.title,
                    creator: formData.creator,
                    agent_name: formData.agentName,
                    status: formData.status,
                    deadline_date: formData.deadlineDate,
                    posted_date: formData.postedDate,
                    script: formData.script,
                    script_url: formData.scriptUrl,
                    location: formData.location
                    // Removed video_url and video_name from backend payload
                };

                const localVideoUrl = formData.videoUrl;
                const localVideoName = formData.videoName;

                try {
                    if (editingItem) {
                        const { error } = await supabaseClient.from('videos').update(videoData).eq('id', editingItem.id);
                        if (error) throw error;
                        if (localVideoUrl) {
                            await saveLocalVideo(editingItem.id, localVideoName, localVideoUrl);
                        }
                    } else {
                        const { data, error } = await supabaseClient.from('videos').insert([videoData]).select();
                        if (error) throw error;
                        if (data && data.length > 0 && localVideoUrl) {
                            await saveLocalVideo(data[0].id, localVideoName, localVideoUrl);
                        }
                    }
                    await fetchData();
                } catch (error) {
                    alert("Error saving: " + error.message);
                }
                setIsModalOpen(false);
            };

            const handleDelete = async () => {
                if (editingItem) {
                    try {
                        const { error } = await supabaseClient.from('videos').delete().eq('id', editingItem.id);
                        if (error) throw error;
                        await fetchData();
                    } catch (error) {
                        alert("Error deleting: " + error.message);
                    }
                    setIsModalOpen(false);
                }
            };

            const handleOpenCreatorUploadModal = (videoId = null) => {
                setUploadingVideoId(videoId);
                setNewCreatorVideoData({
                    creator: '',
                    date: new Date().toISOString().split('T')[0],
                    status: 'Approved'
                });
                setTempFile(null);
                setIsUploadModalOpen(true);
            };

            const handleDoVideoUpload = async (e) => {
                e.preventDefault();
                if (!tempFile && !uploadingVideoId) {
                    alert("Please select a file first");
                    return;
                }

                try {
                    setFetchingBlob(true); // Re-use loading state overlay for saving
                    let videoRecordId = uploadingVideoId;

                    if (!uploadingVideoId) {
                        // Create NEW video from Creator Hub
                        if (!newCreatorVideoData.creator) {
                            alert("Please select a creator.");
                            setFetchingBlob(false);
                            return;
                        }
                        const newVideoData = {
                            title: tempFile ? tempFile.name.split('.')[0] : "New Creator Video",
                            creator: newCreatorVideoData.creator,
                            status: newCreatorVideoData.status,
                            posted_date: newCreatorVideoData.date,
                            deadline_date: newCreatorVideoData.date
                        };
                        const { data, error } = await supabaseClient.from('videos').insert([newVideoData]).select();
                        if (error) throw error;
                        if (data && data.length > 0) {
                            videoRecordId = data[0].id;
                        }
                    } else {
                        // Ensure status updates correctly if updating existing record
                        const { error } = await supabaseClient
                            .from('videos')
                            .update({ 
                                posted_date: newCreatorVideoData.date,
                                status: newCreatorVideoData.status
                            })
                            .eq('id', uploadingVideoId);
                        if (error) throw error;
                    }

                    if (tempFile && videoRecordId) {
                        const reader = new FileReader();
                        reader.onloadend = async () => {
                            await saveLocalVideo(videoRecordId, tempFile.name, reader.result);
                            await fetchData();
                            setIsUploadModalOpen(false);
                            setFetchingBlob(false);
                        };
                        reader.readAsDataURL(tempFile);
                    } else {
                        await fetchData();
                        setIsUploadModalOpen(false);
                        setFetchingBlob(false);
                    }
                } catch (error) {
                    alert("Error uploading video: " + error.message);
                    setFetchingBlob(false);
                }
            };

            const handleUploadToPillar = async (pillar, file) => {
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const scriptData = {
                        pillar: pillar,
                        name: file.name,
                        url: reader.result,
                        date: new Date().toLocaleDateString()
                    };
                    try {
                        const { error } = await supabaseClient.from('scripts').insert([scriptData]);
                        if (error) throw error;
                        await fetchData();
                    } catch (error) {
                        alert("Error uploading script: " + error.message);
                    }
                };
                reader.readAsDataURL(file);
            };

            const handleDeleteFromPillar = async (pillar, scriptId) => {
                try {
                    const { error } = await supabaseClient.from('scripts').delete().eq('id', scriptId);
                    if (error) throw error;
                    await fetchData();
                } catch (error) {
                    alert("Error deleting script: " + error.message);
                }
            };

            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const daysInMonth = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).getDate();
            const startDay = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getDay();
            const daysArr = Array.from({ length: daysInMonth }, (_, i) => i + 1);
            const placeholdersArr = Array.from({ length: startDay }, (_, i) => i);

            const PILLARS = ["Property Projects", "Real Estate Trends", "Why Choose OSAC", "Authority Branding", "Social Proof", "Deal Celebration"];
            const [selectedPillar, setSelectedPillar] = useState(null);

            const CreatorHubView = () => {
                return (
                    <div className="animate-in">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            {CREATORS.map(creator => {
                                const videos = contentItems.filter(v => v.creator === creator);
                                const publishedCount = videos.filter(v => v.status === 'Published').length;
                                return (
                                    <div key={creator} className="bg-white border border-gray-100 rounded-3xl shadow-xl shadow-gray-100 flex flex-col overflow-hidden">
                                        {/* Creator Header */}
                                        <div className="p-6 border-b border-gray-50 text-center">
                                            <h3 className="text-lg tracking-tighter font-black mb-3">{creator}</h3>
                                            <div className="flex justify-center space-x-3 mb-4">
                                                <span className="bg-gray-50 px-4 py-1 rounded-full border border-gray-100 text-[9px] tracking-widest text-gray-500 font-bold">TOTAL {videos.length}</span>
                                                <span className="bg-emerald-50 px-4 py-1 rounded-full border border-emerald-100 text-[9px] tracking-widest text-emerald-600 font-bold">PUBLISHED {publishedCount}</span>
                                            </div>
                                            <div className="flex justify-center space-x-2">
                                                <button 
                                                    onClick={() => {
                                                        setFormData({
                                                            title: '',
                                                            creator: creator,
                                                            agentName: '',
                                                            status: 'Not Started',
                                                            deadlineDate: new Date().toISOString().split('T')[0],
                                                            postedDate: '',
                                                            script: '',
                                                            scriptUrl: '',
                                                            location: '',
                                                            videoName: '',
                                                            videoUrl: ''
                                                        });
                                                        setEditingItem(null);
                                                        setIsModalOpen(true);
                                                    }}
                                                    className="bg-black text-white px-4 py-2 rounded-xl text-[8px] tracking-widest font-bold hover:scale-105 transition-all"
                                                >
                                                    + ADD
                                                </button>
                                                <button 
                                                    onClick={() => handleOpenCreatorUploadModal()}
                                                    className="bg-emerald-600 text-white px-4 py-2 rounded-xl text-[8px] tracking-widest font-bold hover:scale-105 transition-all"
                                                >
                                                    + UPLOAD
                                                </button>
                                            </div>
                                        </div>
                                        {/* Video List */}
                                        <div className="flex-1 p-4 space-y-2 overflow-y-auto custom-scrollbar" style={{maxHeight: '500px'}}>
                                            {videos.length === 0 ? (
                                                <div className="flex items-center justify-center py-12 text-gray-300">
                                                    <p className="text-[9px] tracking-[0.3em]">No videos yet</p>
                                                </div>
                                            ) : (
                                                videos.map(video => (
                                                    <div key={video.id} className="bg-gray-50 rounded-xl p-3 hover:bg-gray-100 transition-all group border border-transparent hover:border-gray-200">
                                                        <div className="flex items-start justify-between mb-2">
                                                            <p className="text-xs font-bold tracking-tight leading-snug flex-1 mr-2 truncate">{video.title}</p>
                                                            <span className={`px-3 py-1 rounded-full text-[10px] tracking-wider font-black uppercase flex-shrink-0 ${video.status === 'Published' ? 'bg-red-100 text-red-800' : video.status === 'Approved' ? 'bg-emerald-100 text-emerald-700' : video.status === 'Editing' ? 'bg-blue-100 text-blue-700' : video.status === 'Shooting' ? 'bg-orange-100 text-orange-700' : video.status === 'Review' ? 'bg-amber-100 text-amber-700' : 'bg-gray-200 text-gray-600'}`}>
                                                                {video.status}
                                                            </span>
                                                        </div>
                                                        <p className="text-[9px] text-gray-500 font-medium truncate mb-1">{video.agentName ? `Agent: ${video.agentName}` : ''}</p>
                                                        <p className="text-[9px] text-gray-400 tracking-wider mb-2">{video.deadlineDate}</p>
                                                        <div className="flex items-center space-x-2">
                                                            {video.videoUrl || video.videoName ? (
                                                                <>
                                                                    <button onClick={() => handleRequestPreview('video', video.id, video.videoName || video.title + ".mp4")} className="text-emerald-600 text-[8px] font-black tracking-widest hover:scale-105 transition-transform">WATCH</button>
                                                                    <span className="text-gray-200">|</span>
                                                                    <button onClick={() => handleOpenCreatorUploadModal(video.id)} className="text-[8px] tracking-widest text-gray-400 hover:text-black font-bold">UPDATE</button>
                                                                </>
                                                            ) : (
                                                                <button onClick={() => handleOpenCreatorUploadModal(video.id)} className="text-[8px] tracking-widest text-black font-bold hover:scale-105 transition-transform">UPLOAD VIDEO</button>
                                                            )}
                                                            <span className="text-gray-200">|</span>
                                                            <button onClick={() => handleOpenModal(video)} className="text-[8px] tracking-widest text-gray-400 hover:text-black font-bold">EDIT</button>
                                                            <span className="text-gray-200">|</span>
                                                            <button onClick={async () => {
                                                                if(confirm("Delete this content record?")) {
                                                                    const { error } = await supabaseClient.from('videos').delete().eq('id', video.id);
                                                                    if(!error) fetchData();
                                                                }
                                                            }} className="text-[8px] tracking-widest text-red-300 hover:text-red-500 font-bold">DEL</button>
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            const ContentPillarsView = () => (
                <div className="animate-in space-y-12">
                    {!selectedPillar ? (
                        <div className="grid grid-cols-2 lg:grid-cols-3 gap-8">
                            {PILLARS.map(pillar => (
                                <div key={pillar} onClick={() => setSelectedPillar(pillar)} className="bg-white border border-gray-100 rounded-[3rem] p-12 shadow-xl shadow-gray-50 hover:border-black transition-all cursor-pointer group flex flex-col items-center text-center">
                                    <div className="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center text-3xl mb-6 group-hover:scale-110 transition-transform">
                                        {pillar.includes("Property") ? "🏢" : pillar.includes("Trends") ? "📈" : pillar.includes("Why") ? "❓" : pillar.includes("Branding") ? "👑" : pillar.includes("Proof") ? "💬" : "🎉"}
                                    </div>
                                    <h3 className="text-xl tracking-tighter mb-4">{pillar}</h3>
                                    <p className="text-[10px] text-gray-400 tracking-widest">{managedScripts[pillar].length} Scripts stored</p>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <div className="bg-white border border-gray-100 rounded-[3rem] p-12 shadow-2xl shadow-gray-50 min-h-[600px] flex flex-col">
                            <div className="flex justify-between items-center mb-12 border-b border-gray-50 pb-8">
                                <button onClick={() => setSelectedPillar(null)} className="text-[10px] tracking-widest hover:text-black flex items-center group">
                                    <span className="mr-2 group-hover:-translate-x-1 transition-transform">←</span> Back to pillars
                                </button>
                                <h3 className="text-3xl tracking-tighter font-light">{selectedPillar}</h3>
                                <button onClick={() => document.getElementById('pillarUpload').click()} className="bg-black text-white px-8 py-4 rounded-2xl text-[10px] tracking-widest hover:scale-105 transition-all shadow-xl shadow-black/20">
                                    Upload new script
                                </button>
                                <input type="file" id="pillarUpload" className="hidden" onChange={(e) => { if (e.target.files[0]) handleUploadToPillar(selectedPillar, e.target.files[0]); }} />
                            </div>
                            <div className="flex-1 space-y-4">
                                {managedScripts[selectedPillar].length === 0 ? (
                                    <div className="h-full flex flex-col items-center justify-center text-gray-300 py-20">
                                        <p className="text-[10px] tracking-[0.4em]">No scripts uploaded yet</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 gap-4">
                                        {managedScripts[selectedPillar].map(script => (
                                            <div key={script.id} className="flex justify-between items-center p-8 bg-gray-50 rounded-3xl border border-transparent hover:border-black/10 transition-all group">
                                                <div className="flex items-center">
                                                    <span className="text-2xl mr-6">📄</span>
                                                    <div>
                                                        <p className="text-sm tracking-widest mb-1">{script.name}</p>
                                                        <p className="text-[9px] text-gray-400 tracking-widest">{script.date}</p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center space-x-6">
                                                    <button onClick={() => handleRequestPreview('script', script.id, script.name)} className="text-[9px] tracking-widest text-gray-400 hover:text-black underline">View</button>
                                                    <button onClick={() => handleDeleteFromPillar(selectedPillar, script.id)} className="text-[9px] tracking-widest text-red-400 hover:text-red-600 underline">Delete</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) || <div className="h-full flex items-center justify-center py-20"><p className="text-[10px] tracking-[0.4em] text-gray-300">No scripts found</p></div>}
                            </div>
                        </div>
                    )}
                </div>
            );

            const VideoDetailsView = () => {
                const statusOrder = ["Not Started", "Scripting", "Shooting", "Editing", "Review", "Approved", "Scheduled", "Published"];
                const statusColors = {
                    "Published": { bg: "bg-red-50", border: "border-red-200", header: "bg-red-700", dot: "bg-red-700" },
                    "Approved": { bg: "bg-emerald-50", border: "border-emerald-200", header: "bg-emerald-500", dot: "bg-emerald-500" },
                    "Review": { bg: "bg-amber-50", border: "border-amber-200", header: "bg-amber-500", dot: "bg-amber-500" },
                    "Editing": { bg: "bg-blue-50", border: "border-blue-200", header: "bg-blue-500", dot: "bg-blue-500" },
                    "Shooting": { bg: "bg-orange-50", border: "border-orange-200", header: "bg-orange-500", dot: "bg-orange-500" },
                    "Scripting": { bg: "bg-purple-50", border: "border-purple-200", header: "bg-purple-500", dot: "bg-purple-500" },
                    "Scheduled": { bg: "bg-cyan-50", border: "border-cyan-200", header: "bg-cyan-500", dot: "bg-cyan-500" },
                    "Not Started": { bg: "bg-gray-50", border: "border-gray-200", header: "bg-gray-400", dot: "bg-gray-400" }
                };

                const [dragOverStatus, setDragOverStatus] = useState(null);
                const [draggingId, setDraggingId] = useState(null);

                const grouped = useMemo(() => {
                    const map = {};
                    statusOrder.forEach(s => map[s] = []);
                    contentItems.forEach(item => {
                        const s = item.status || "Not Started";
                        if (map[s]) map[s].push(item);
                        else map["Not Started"].push(item);
                    });
                    return map;
                }, [contentItems]);

                const handleDragStart = (e, itemId) => {
                    e.dataTransfer.setData('text/plain', itemId);
                    setDraggingId(itemId);
                };

                const handleDragEnd = () => {
                    setDraggingId(null);
                    setDragOverStatus(null);
                };

                const handleDragOver = (e, status) => {
                    e.preventDefault();
                    setDragOverStatus(status);
                };

                const handleDragLeave = () => {
                    setDragOverStatus(null);
                };

                const handleDrop = async (e, newStatus) => {
                    e.preventDefault();
                    setDragOverStatus(null);
                    setDraggingId(null);
                    const itemId = e.dataTransfer.getData('text/plain');
                    const item = contentItems.find(i => String(i.id) === String(itemId));
                    if (!item || item.status === newStatus) return;
                    try {
                        const { error } = await supabaseClient.from('videos').update({ status: newStatus }).eq('id', item.id);
                        if (error) throw error;
                        await fetchData();
                    } catch (error) {
                        alert("Error updating status: " + error.message);
                    }
                };

                return (
                    <div className="animate-in">
                        <p className="text-[10px] text-gray-400 tracking-widest mb-6 font-bold">DRAG AND DROP videos between columns to update status</p>
                        <div className="flex gap-4 overflow-x-auto custom-scrollbar pb-4" style={{minHeight: '500px'}}>
                            {statusOrder.map(status => {
                                const colors = statusColors[status];
                                const items = grouped[status] || [];
                                const isOver = dragOverStatus === status;
                                return (
                                    <div 
                                        key={status} 
                                        className={`flex-shrink-0 flex flex-col rounded-2xl border-2 transition-all ${isOver ? 'border-black bg-black/5 scale-[1.02]' : 'border-gray-100 bg-white'}`}
                                        style={{width: '220px'}}
                                        onDragOver={(e) => handleDragOver(e, status)}
                                        onDragLeave={handleDragLeave}
                                        onDrop={(e) => handleDrop(e, status)}
                                    >
                                        {/* Column Header */}
                                        <div className={`${colors.header} text-white px-4 py-3 rounded-t-xl flex items-center justify-between`}>
                                            <span className="text-[10px] tracking-widest font-black uppercase">{status}</span>
                                            <span className="bg-white/20 px-2 py-0.5 rounded-full text-[9px] font-bold">{items.length}</span>
                                        </div>
                                        {/* Cards */}
                                        <div className="flex-1 p-2 space-y-2 overflow-y-auto custom-scrollbar" style={{maxHeight: '450px'}}>
                                            {items.length === 0 ? (
                                                <div className="flex items-center justify-center py-8 text-gray-300">
                                                    <p className="text-[8px] tracking-[0.2em]">Drop here</p>
                                                </div>
                                            ) : (
                                                items.map(item => (
                                                    <div 
                                                        key={item.id}
                                                        draggable
                                                        onDragStart={(e) => handleDragStart(e, item.id)}
                                                        onDragEnd={handleDragEnd}
                                                        className={`${colors.bg} border ${colors.border} rounded-xl p-3 cursor-grab active:cursor-grabbing hover:shadow-md transition-all ${String(draggingId) === String(item.id) ? 'opacity-40 scale-95' : 'opacity-100'}`}
                                                    >
                                                        <p className="text-[11px] font-bold tracking-tight leading-snug mb-1 truncate">{item.title}</p>
                                                        <p className="text-[9px] text-gray-500 font-medium truncate mb-1">{item.creator}</p>
                                                        <p className="text-[8px] text-gray-400 tracking-wider mb-2">{item.deadlineDate}</p>
                                                        <div className="flex items-center space-x-2">
                                                            {(item.videoUrl || item.videoName) && (
                                                                <button onClick={(e) => { e.stopPropagation(); handleRequestPreview('video', item.id, item.videoName || "video.mp4"); }} className="text-emerald-600 text-[8px] font-black tracking-wider hover:scale-105 transition-transform">WATCH</button>
                                                            )}
                                                            <button onClick={(e) => { e.stopPropagation(); handleOpenModal(item); }} className="text-[8px] tracking-wider text-gray-400 hover:text-black font-bold">EDIT</button>
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            const EditorialCalendar = () => (
                <div className="animate-in bg-white border border-gray-100 rounded-[3rem] p-10 min-h-[700px] shadow-2xl shadow-gray-100 flex flex-col">
                    <div className="flex flex-col lg:flex-row justify-between lg:items-center mb-10 pb-8 border-b border-gray-50 gap-6">
                        <div>
                            <h3 className="text-2xl font-semibold tracking-tight leading-none">{monthNames[viewDate.getMonth()]} {viewDate.getFullYear()}</h3>
                            <p className="text-[10px] text-gray-500 mt-2 tracking-widest font-medium">Click any day to add or edit</p>
                        </div>
                        <div className="flex items-center space-x-4">
                            <button onClick={(e) => { e.stopPropagation(); setViewDate(new Date(viewDate.setMonth(viewDate.getMonth() - 1))); }} className="p-4 border border-gray-100 rounded-2xl hover:bg-black hover:text-white transition-all text-xs">Prev</button>
                            <button onClick={(e) => { e.stopPropagation(); setViewDate(new Date(viewDate.setMonth(viewDate.getMonth() + 1))); }} className="p-4 border border-gray-100 rounded-2xl hover:bg-black hover:text-white transition-all text-xs">Next</button>
                        </div>
                    </div>
                    <div className="overflow-x-auto overflow-y-hidden custom-scrollbar pb-4">
                        <div className="min-w-[800px]">
                            <div className="grid grid-cols-7 gap-4 mb-4">
                                {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(d => <div key={d} className="text-center text-[11px] text-gray-500 tracking-[0.2em] font-bold">{d}</div>)}
                            </div>
                            <div className="grid grid-cols-7 gap-4 flex-1">
                                {placeholdersArr.map(p => <div key={`p-${p}`} className="p-4"></div>)}
                                {daysArr.map(d => {
                            const dateStr = `${viewDate.getFullYear()}-${String(viewDate.getMonth() + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                            const dayData = itemsByDate[dateStr] || { events: [], photoshoots: [] };
                            const dayEvents = dayData.events;
                            const dayPhotoshoots = dayData.photoshoots;
                            return (
                                <div key={d} onClick={() => handleOpenModal(null, dateStr)} className="border border-gray-50 rounded-2xl p-4 min-h-[110px] hover:border-black/20 hover:bg-gray-50/50 transition-all cursor-pointer group flex flex-col">
                                    <span className="text-gray-400 text-sm font-semibold group-hover:text-black transition-colors">{d}</span>
                                    <div className="mt-2 space-y-1">
                                        {dayEvents.map(it => {
                                            const colors = it.status === 'Published' ? 'bg-emerald-50 border-emerald-100' :
                                                it.status === 'Approved' ? 'bg-emerald-50 border-emerald-100' :
                                                it.status === 'Editing' ? 'bg-blue-50 border-blue-100' :
                                                    it.status === 'Scripting' ? 'bg-purple-50 border-purple-100' :
                                                        it.status === 'Shooting' ? 'bg-orange-50 border-orange-100' :
                                                            it.status === 'Review' ? 'bg-amber-50 border-amber-100' :
                                                                'bg-gray-50 border-gray-100';
                                            return (
                                                <div key={it.id} onClick={(e) => { e.stopPropagation(); handleOpenModal(it); }} className={`${colors} border p-3 rounded-2xl shadow-sm hover:border-black transition-all flex flex-col items-start`}>
                                                    <span className="text-[10px] font-black leading-tight w-full truncate mb-2">{it.title}</span>
                                                    <div className="flex items-center space-x-2 w-full overflow-hidden">
                                                        <span className="text-[7px] tracking-widest font-black uppercase px-2 py-0.5 bg-black/5 rounded-full whitespace-nowrap">{it.status}</span>
                                                        <span className="text-[7px] text-gray-400 font-bold truncate">/ {it.agentName || 'N/A'}</span>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                        {dayPhotoshoots.map(ps => (
                                            <div key={ps.id} onClick={(e) => { e.stopPropagation(); handleOpenPhotoshootModal(ps); }} className="bg-emerald-600 border border-emerald-700 p-2 rounded-xl shadow-sm hover:border-black transition-all flex flex-col items-start cursor-pointer">
                                                <span className="text-[9px] text-white font-black leading-tight w-full truncate">📸 {ps.name}</span>
                                                <span className="text-[7px] text-emerald-100 font-bold uppercase">{ps.team}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            );
                        })}
                            </div>
                        </div>
                    </div>
                </div>
            );

            const PhotoshootDetailsView = () => (
                <div className="animate-in space-y-8">
                    <div className="flex justify-between items-center mb-8">
                        <button onClick={() => handleOpenPhotoshootModal()} className="bg-emerald-600 text-white px-8 py-4 rounded-2xl text-[10px] tracking-widest font-bold shadow-xl shadow-emerald-200 hover:bg-emerald-700 transition-all">
                            Add photoshoot
                        </button>
                    </div>
                    <div className="grid grid-cols-1 gap-6">
                        {photoshoots.length === 0 ? (
                            <div className="bg-white border border-gray-100 rounded-[3rem] p-20 text-center shadow-xl shadow-gray-50">
                                <p className="text-[10px] tracking-[0.4em] text-gray-300">No photoshoot records found</p>
                            </div>
                        ) : (
                            photoshoots.map(item => (
                                <div key={item.id} className="bg-white border border-emerald-50 rounded-[3rem] p-10 shadow-xl shadow-emerald-50/30 flex items-center justify-between group hover:border-emerald-500 transition-all">
                                    <div className="flex-1 grid grid-cols-1 md:grid-cols-4 gap-8 text-emerald-900">
                                        <div className="space-y-1">
                                            <p className="text-[10px] text-emerald-500 tracking-[0.2em] mb-2 font-bold uppercase">Photoshoot Name</p>
                                            <p className="text-lg font-bold tracking-tight leading-tight">{item.name}</p>
                                        </div>
                                        <div className="space-y-1">
                                            <p className="text-[10px] text-emerald-500 tracking-[0.2em] mb-2 font-bold uppercase">Assigned Team</p>
                                            <p className="text-sm tracking-widest font-semibold">{item.team}</p>
                                        </div>
                                        <div className="space-y-1">
                                            <p className="text-[10px] text-emerald-500 tracking-[0.2em] mb-2 font-bold uppercase">Scheduled Date</p>
                                            <p className="text-sm tracking-widest font-semibold">{item.date}</p>
                                        </div>
                                        <div className="space-y-1">
                                            <p className="text-[10px] text-emerald-500 tracking-[0.2em] mb-2 font-bold uppercase">Type</p>
                                            <div className="mt-1">
                                                <span className="px-6 py-3 rounded-full text-[10px] tracking-widest font-black bg-emerald-100 text-emerald-700 border border-emerald-200 uppercase">Photoshoot</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="ml-10 opacity-0 group-hover:opacity-100 transition-opacity">
                                        <button onClick={() => handleOpenPhotoshootModal(item)} className="bg-emerald-600 text-white px-8 py-4 rounded-2xl text-[9px] tracking-widest hover:bg-emerald-700 transition-all shadow-xl shadow-emerald-200">View / Edit</button>
                                    </div>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-white text-black flex font-poppins selection:bg-black selection:text-white">
                    {/* Main Sidebar - Responsive */}
                    <nav className={`w-80 bg-white border-r border-gray-100 flex flex-col fixed inset-y-0 z-[100] transition-transform duration-300 transform ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} lg:translate-x-0`}>
                        <div className="p-8 lg:p-12 border-b border-gray-50 flex justify-between items-center">
                            <h1 className="text-xl tracking-[0.2em] leading-none font-bold">Osac Hub</h1>
                            <button onClick={() => setIsMobileMenuOpen(false)} className="lg:hidden text-2xl">&times;</button>
                        </div>
                        <div className="flex-1 px-8 space-y-4 mt-12 overflow-y-auto">
                            <button onClick={() => { setCurrentView('calendar'); setIsMobileMenuOpen(false); }} className={`w-full flex items-center justify-center px-10 py-7 rounded-3xl transition-all text-sm tracking-[0.2em] font-bold ${currentView === 'calendar' ? 'bg-black text-white shadow-xl shadow-black/20' : 'text-gray-500 hover:text-black hover:bg-gray-50'}`}>
                                CALENDAR
                            </button>
                            <button onClick={() => { handleOpenModal(); setIsMobileMenuOpen(false); }} className="w-full flex items-center justify-center px-10 py-7 rounded-3xl transition-all text-sm tracking-[0.2em] border-2 border-black/5 hover:border-black bg-gray-50/50 font-bold">
                                NEW VIDEO
                            </button>
                            <button onClick={() => { setCurrentView('details'); setIsMobileMenuOpen(false); }} className={`w-full flex items-center justify-center px-10 py-7 rounded-3xl transition-all text-sm tracking-[0.2em] ${currentView === 'details' ? 'bg-black text-white shadow-xl shadow-black/20' : 'text-gray-600 hover:text-black hover:bg-gray-50'} mt-4 font-bold`}>
                                VIDEO DETAILS
                            </button>

                            <button onClick={() => { setCurrentView('creators'); setIsMobileMenuOpen(false); }} className={`w-full flex items-center justify-center px-10 py-7 rounded-3xl transition-all text-sm tracking-[0.2em] ${currentView === 'creators' ? 'bg-black text-white shadow-xl shadow-black/20' : 'text-gray-600 hover:text-black hover:bg-gray-50'} border-2 border-dashed border-gray-100 mt-4 group font-bold`}>
                                CREATOR HUB
                            </button>
                            <button onClick={() => { setCurrentView('photoshoots'); setIsMobileMenuOpen(false); }} className={`w-full flex items-center justify-center px-10 py-7 rounded-3xl transition-all text-sm tracking-[0.2em] ${currentView === 'photoshoots' ? 'bg-emerald-600 text-white shadow-xl shadow-emerald-200' : 'border-2 border-dashed border-emerald-100 bg-emerald-50/20 text-emerald-700 hover:border-emerald-500 hover:bg-emerald-50'} mt-4 group font-bold`}>
                                PHOTOSHOOTS
                            </button>
                        </div>
                    </nav>

                    {/* Mobile Overlay */}
                    {isMobileMenuOpen && (
                        <div onClick={() => setIsMobileMenuOpen(false)} className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[90] lg:hidden animate-in"></div>
                    )}

                    <main className="flex-1 lg:ml-80 p-6 lg:p-20 max-w-full lg:max-w-[1700px] w-full overflow-x-hidden">
                        <header className="mb-12 lg:mb-20 flex flex-col lg:flex-row lg:justify-between lg:items-end border-b border-gray-100 pb-8 lg:pb-12">
                            <div className="flex justify-between items-center w-full lg:w-auto">
                                <h2 className="text-3xl lg:text-5xl tracking-tighter font-black leading-tight">
                                    {currentView === 'calendar' ? 'Marketing Board' : currentView === 'pillars' ? 'Content pillars' : currentView === 'details' ? 'Video details' : currentView === 'creators' ? 'Creator Hub' : currentView === 'photoshoots' ? 'Photoshoot details' : 'Settings'}
                                </h2>
                                <button onClick={() => setIsMobileMenuOpen(true)} className="lg:hidden p-4 bg-gray-50 rounded-2xl hover:bg-black hover:text-white transition-all">
                                    <span className="text-xl">☰</span>
                                </button>
                            </div>
                            <p className="text-[10px] lg:text-[12px] text-gray-400 mt-4 lg:mt-6 tracking-[0.5em] font-bold uppercase">
                                {loading ? 'Syncing...' : 'Content operations'}
                            </p>
                        </header>
                        <div className="overflow-x-auto lg:overflow-visible">
                            {loading ? (
                                <div className="h-[400px] lg:h-[600px] flex items-center justify-center">
                                    <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-black"></div>
                                </div>
                            ) : (
                                <>
                                    {currentView === 'calendar' && <EditorialCalendar />}

                                    {currentView === 'details' && <VideoDetailsView />}
                                    {currentView === 'creators' && <CreatorHubView />}
                                    {currentView === 'photoshoots' && <PhotoshootDetailsView />}
                                </>
                            )}
                        </div>
                    </main>

                    {fetchingBlob && (
                        <div className="fixed inset-0 z-[300] flex flex-col items-center justify-center bg-black/60 backdrop-blur-md animate-in">
                            <div className="bg-white p-12 rounded-[3.5rem] flex flex-col items-center shadow-2xl">
                                <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-black mb-6"></div>
                                <p className="text-[10px] tracking-[0.4em] font-black text-black">STREAMING FILE...</p>
                            </div>
                        </div>
                    )}

                    {previewUrl && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/95 backdrop-blur-3xl animate-in font-poppins">
                            <button onClick={() => setPreviewUrl(null)} className="absolute top-6 right-6 text-white text-5xl font-light hover:scale-110 transition-all z-10">&times;</button>
                            <div className="w-full max-w-4xl flex flex-col items-center" style={{maxHeight: '95vh'}}>
                                <p className="text-white text-[10px] tracking-[0.5em] mb-4 opacity-50 font-medium">Viewing attached file: {previewName}</p>
                                <div className="bg-white rounded-2xl shadow-2xl w-full flex flex-col items-center p-3" style={{maxHeight: '85vh'}}>
                                    {previewName.toLowerCase().match(/\.(mp4|webm|ogg)$/) || previewUrl.startsWith('data:video') ? (
                                        <video src={previewUrl} controls className="w-full rounded-xl shadow-xl" style={{maxHeight: '78vh', objectFit: 'contain'}} autoPlay />
                                    ) : previewName.toLowerCase().match(/\.(jpg|jpeg|png|gif|webp)$/) || previewUrl.startsWith('data:image') || previewUrl.startsWith('blob:') ? <img src={previewUrl} className="w-full rounded-xl" style={{maxHeight: '78vh', objectFit: 'contain'}} alt="Preview" /> : (
                                        <div className="p-20 text-center">
                                            <p className="text-2xl tracking-tighter mb-8 text-black">Document preview not available</p>
                                            <a href={previewUrl} download={previewName} className="bg-black text-white px-10 py-5 rounded-2xl text-[10px] tracking-widest font-normal">Download to view</a>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-12 bg-white/95 backdrop-blur-xl animate-in font-poppins">
                            <div className="bg-white border border-black/10 rounded-[4rem] w-full max-w-2xl p-20 shadow-[0_0_100px_rgba(0,0,0,0.05)] relative max-h-[90vh] overflow-y-auto custom-scrollbar">
                                <button onClick={() => setIsModalOpen(false)} className="absolute top-10 right-10 text-4xl hover:scale-110 transition-all font-light text-black">&times;</button>
                                <h2 className="text-4xl mb-12 tracking-tighter font-normal text-black">
                                    {editingItem ? 'Edit video' : 'Add new video'}
                                </h2>
                                <form className="space-y-12" onSubmit={handleSave}>
                                    <div className="space-y-4">
                                        <label className="text-[10px] tracking-widest text-gray-400">Project / video title</label>
                                        <input required value={formData.title} onChange={(e) => setFormData({ ...formData, title: e.target.value })} placeholder="Experience Dubai vlog..." className="w-full bg-gray-50 border border-transparent rounded-3xl px-8 py-6 focus:border-black outline-none transition-all text-sm tracking-widest text-black" />
                                    </div>
                                    <div className="space-y-4">
                                        <label className="text-[10px] tracking-widest text-gray-400">Content creator name</label>
                                        <select required value={formData.creator} onChange={(e) => setFormData({ ...formData, creator: e.target.value })} className="w-full bg-gray-50 border border-transparent rounded-3xl px-8 py-6 focus:border-black outline-none transition-all text-sm tracking-widest text-black">
                                            <option value="">Select Creator</option>
                                            {CREATORS.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-4">
                                        <label className="text-[10px] tracking-widest text-gray-400">Agent name (In video)</label>
                                        <input required value={formData.agentName} onChange={(e) => setFormData({ ...formData, agentName: e.target.value })} placeholder="Agent name..." className="w-full bg-gray-50 border border-transparent rounded-3xl px-8 py-6 focus:border-black outline-none transition-all text-sm tracking-widest text-black" />
                                    </div>
                                    <div className="space-y-4">
                                        <label className="text-[10px] tracking-widest text-gray-400">Project / Video Location</label>
                                        <input value={formData.location} onChange={(e) => setFormData({ ...formData, location: e.target.value })} placeholder="Location..." className="w-full bg-gray-50 border border-transparent rounded-3xl px-8 py-6 focus:border-black outline-none transition-all text-sm tracking-widest text-black" />
                                    </div>
                                    <div className="grid grid-cols-1 gap-8">
                                        <div className="space-y-4">
                                            <label className="text-[10px] tracking-widest text-gray-400">Script attachment</label>
                                            <div className="relative group">
                                                <input type="file" id="projectScriptFile" onChange={(e) => {
                                                    const file = e.target.files[0];
                                                    if (file) {
                                                        const reader = new FileReader();
                                                        reader.onloadend = () => { setFormData({ ...formData, script: file.name, scriptUrl: reader.result }); };
                                                        reader.readAsDataURL(file);
                                                    }
                                                }} className="hidden" accept="image/*,.pdf,.doc,.docx,.txt" />
                                                <label htmlFor="projectScriptFile" className="w-full bg-gray-50 border border-dashed border-gray-200 rounded-3xl px-8 py-10 flex flex-col items-center justify-center cursor-pointer hover:border-black hover:bg-gray-100 transition-all group overflow-hidden">
                                                    {formData.scriptUrl && formData.scriptUrl.startsWith('data:image') ? (
                                                        <div className="w-full flex flex-col items-center">
                                                            <img src={formData.scriptUrl} className="max-w-[200px] h-auto rounded-xl mb-4 shadow-sm" alt="Preview" />
                                                            <span className="text-[10px] text-black font-semibold">{formData.script}</span>
                                                        </div>
                                                    ) : (
                                                        <>
                                                            <span className="text-3xl mb-3 group-hover:scale-110 transition-transform">📎</span>
                                                            <span className="text-[10px] tracking-widest text-gray-400 group-hover:text-black text-center">{formData.script ? `Attached: ${formData.script}` : "Upload script"}</span>
                                                        </>
                                                    )}
                                                    {formData.script && <button type="button" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setFormData({ ...formData, script: '', scriptUrl: '' }); }} className="mt-4 text-[9px] text-red-500 underline tracking-widest">Remove</button>}
                                                </label>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-3 gap-8">
                                        <div className="space-y-4">
                                            <label className="text-[10px] tracking-widest text-gray-400">Target date</label>
                                            <input type="date" required value={formData.deadlineDate} onChange={(e) => setFormData({ ...formData, deadlineDate: e.target.value })} className="w-full bg-gray-50 border border-transparent rounded-3xl px-8 py-6 focus:border-black outline-none transition-all text-xs text-black" />
                                        </div>
                                        <div className="space-y-4">
                                            <label className="text-[10px] tracking-widest text-gray-400">Posted date</label>
                                            <input type="date" value={formData.postedDate} onChange={(e) => setFormData({ ...formData, postedDate: e.target.value })} className="w-full bg-gray-50 border border-transparent rounded-3xl px-8 py-6 focus:border-black outline-none transition-all text-xs text-black" />
                                        </div>
                                        <div className="space-y-4">
                                            <label className="text-[10px] tracking-widest text-gray-400">Status</label>
                                            <select value={formData.status} onChange={(e) => setFormData({ ...formData, status: e.target.value })} className="w-full bg-gray-50 border border-transparent rounded-3xl px-8 py-6 focus:border-black outline-none transition-all text-xs text-black">
                                                {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="flex gap-6 pt-8">
                                        {editingItem && <button type="button" onClick={handleDelete} className="flex-1 py-6 border border-red-100 text-red-500 rounded-3xl text-[10px] tracking-widest hover:bg-red-50 transition-all font-medium">Delete project</button>}
                                        <button type="submit" className="flex-[2] bg-black text-white py-6 rounded-3xl text-[10px] tracking-widest font-normal shadow-2xl shadow-black/20 hover:scale-[1.02] transition-all">
                                            {editingItem ? 'Update video' : 'Save to board'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                    {isPhotoshootModalOpen && (
                        <div className="fixed inset-0 z-[150] flex items-center justify-center p-12 bg-white/95 backdrop-blur-xl animate-in font-poppins">
                            <div className="bg-white border border-emerald-500/20 rounded-[4rem] w-full max-w-xl p-20 shadow-[0_0_100px_rgba(16,185,129,0.1)] relative">
                                <button onClick={() => setIsPhotoshootModalOpen(false)} className="absolute top-10 right-10 text-4xl hover:scale-110 transition-all font-light text-black">&times;</button>
                                <h2 className="text-4xl mb-12 tracking-tighter font-normal text-emerald-700 font-bold">
                                    Schedule Photoshoot
                                </h2>
                                <form className="space-y-12" onSubmit={handleSavePhotoshoot}>
                                    <div className="space-y-4">
                                        <label className="text-[10px] tracking-widest text-emerald-600 font-bold uppercase">New Agent Name</label>
                                        <input required value={photoshootFormData.name} onChange={(e) => setPhotoshootFormData({ ...photoshootFormData, name: e.target.value })} placeholder="Enter new agent name..." className="w-full bg-emerald-50/50 border border-transparent rounded-3xl px-8 py-6 focus:border-emerald-500 outline-none transition-all text-sm tracking-widest text-black" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-8">
                                        <div className="space-y-4">
                                            <label className="text-[10px] tracking-widest text-emerald-600 font-bold uppercase">Photoshoot Date</label>
                                            <input type="date" required value={photoshootFormData.date} onChange={(e) => setPhotoshootFormData({ ...photoshootFormData, date: e.target.value })} className="w-full bg-emerald-50/50 border border-transparent rounded-3xl px-8 py-6 focus:border-emerald-500 outline-none transition-all text-xs text-black" />
                                        </div>
                                        <div className="space-y-4">
                                            <label className="text-[10px] tracking-widest text-emerald-600 font-bold uppercase">Assigned Team</label>
                                            <select value={photoshootFormData.team} onChange={(e) => setPhotoshootFormData({ ...photoshootFormData, team: e.target.value })} className="w-full bg-emerald-50/50 border border-transparent rounded-3xl px-8 py-6 focus:border-emerald-500 outline-none transition-all text-sm tracking-widest text-black">
                                                {TEAMS.map(team => <option key={team} value={team}>{team}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="flex gap-6 pt-8">
                                        {editingPhotoshoot && <button type="button" onClick={handleDeletePhotoshoot} className="flex-1 py-6 border border-red-100 text-red-500 rounded-3xl text-[10px] tracking-widest hover:bg-red-50 transition-all font-medium">Delete record</button>}
                                        <button type="submit" className="flex-[2] bg-emerald-600 text-white py-6 rounded-3xl text-[10px] tracking-widest font-bold shadow-2xl shadow-emerald-200 hover:bg-emerald-700 hover:scale-[1.02] transition-all">
                                            {editingPhotoshoot ? 'Update info' : 'Book photoshoot'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {isUploadModalOpen && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-12 bg-black/40 backdrop-blur-md animate-in font-poppins">
                            <div className="bg-white border border-gray-100 rounded-[4rem] w-full max-w-lg p-16 shadow-2xl relative">
                                <button onClick={() => setIsUploadModalOpen(false)} className="absolute top-8 right-8 text-3xl hover:scale-110 transition-all font-light text-black">&times;</button>
                                <h2 className="text-3xl mb-10 tracking-tighter font-black text-black">
                                    {uploadingVideoId ? 'Update Uploaded Video' : 'Add / Upload Video'}
                                </h2>
                                <form className="space-y-8" onSubmit={handleDoVideoUpload}>
                                    
                                    {!uploadingVideoId && (
                                        <div className="space-y-4">
                                            <label className="text-[10px] tracking-widest text-gray-400 font-bold uppercase">Creator Name</label>
                                            <select 
                                                required 
                                                value={newCreatorVideoData.creator} 
                                                onChange={(e) => setNewCreatorVideoData({...newCreatorVideoData, creator: e.target.value})} 
                                                className="w-full bg-gray-50 border border-transparent rounded-2xl px-6 py-4 focus:border-black outline-none transition-all text-sm font-bold"
                                            >
                                                <option value="" disabled>Select Creator</option>
                                                {CREATORS.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                    )}

                                    <div className="space-y-4">
                                        <label className="text-[10px] tracking-widest text-gray-400 font-bold uppercase">Select Video File</label>
                                        <div
